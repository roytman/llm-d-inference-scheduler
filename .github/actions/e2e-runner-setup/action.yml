name: E2E runner setup
description: Frees disk space and restores Go module/build caches for an e2e runner.
outputs:
  go-mod-cache:
    description: Absolute path to the Go module cache directory
    value: ${{ steps.go-cache.outputs.mod }}
  go-build-cache:
    description: Absolute path to the Go build cache directory
    value: ${{ steps.go-cache.outputs.build }}
  hf-cache-host-path:
    description: Host path of the HuggingFace weights cache (for kind extraMounts)
    value: ${{ steps.hf-cache.outputs.path }}
runs:
  using: "composite"
  steps:
    # Custom profile with directory-only removals.
    # cleanup-profile: max frees more space but takes longer.
    - name: Free disk space
      # justinthelaw/maximize-github-runner-space@v0.9.0
      uses: justinthelaw/maximize-github-runner-space@ed391644e646cac4b88480d2f9b12d135f1ccf77
      with:
        cleanup-profile: custom
        remove-android: 'true'
        remove-dotnet: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-cached-tools: 'false'
        remove-swift: 'true'
        remove-julia: 'true'
        remove-rust: 'true'
        remove-miniconda: 'true'
        swapfile-size: 0

    - name: Create Go cache dirs
      id: go-cache
      shell: bash
      run: |
        mkdir -p "$HOME/.cache/llm-d-gomodcache" "$HOME/.cache/llm-d-gobuildcache"
        echo "mod=$HOME/.cache/llm-d-gomodcache" >> "$GITHUB_OUTPUT"
        echo "build=$HOME/.cache/llm-d-gobuildcache" >> "$GITHUB_OUTPUT"

    - name: Cache Go modules and build cache
      uses: actions/cache@v5
      with:
        path: |
          ${{ steps.go-cache.outputs.mod }}
          ${{ steps.go-cache.outputs.build }}
        key: go-cache-${{ runner.os }}-${{ hashFiles('go.sum') }}
        restore-keys: |
          go-cache-${{ runner.os }}-

    # HuggingFace weights cache for the vllm-render sidecar. Bump the trailing
    # -vN when kvModelName in test/e2e/e2e_suite_test.go changes, otherwise the
    # cache will serve stale weights.
    - name: Create HF cache dir
      id: hf-cache
      shell: bash
      run: |
        mkdir -p "${RUNNER_TEMP}/hf-cache"
        echo "path=${RUNNER_TEMP}/hf-cache" >> "$GITHUB_OUTPUT"

    - name: Cache HuggingFace weights
      uses: actions/cache@v5
      with:
        path: ${{ steps.hf-cache.outputs.path }}
        key: hf-cache-${{ runner.os }}-Qwen2.5-1.5B-Instruct-v1
        restore-keys: |
          hf-cache-${{ runner.os }}-Qwen2.5-1.5B-Instruct-

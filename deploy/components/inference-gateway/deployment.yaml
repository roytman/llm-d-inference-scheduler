apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${EPP_NAME}
  labels:
    app: ${EPP_NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${EPP_NAME}
  template:
    metadata:
      labels:
        app: ${EPP_NAME}
    spec:
      serviceAccountName: ${EPP_NAME}
      terminationGracePeriodSeconds: 130
      containers:
      - name: epp
        image: ${EPP_IMAGE}
        imagePullPolicy: IfNotPresent
        args:
        - --pool-name
        - "${POOL_NAME}"
        - --pool-namespace
        - "${NAMESPACE}"
        - --v
        - "4"
        - --zap-encoder
        - "json"
        - --grpc-port
        - "9002"
        - --grpc-health-port
        - "9003"
        - --config-file
        - "/etc/epp/epp-config.yaml"
        - --metrics-endpoint-auth=${METRICS_ENDPOINT_AUTH}
        ports:
        - containerPort: 5557
        - containerPort: 9002
        - containerPort: 9003
        - name: metrics
          containerPort: 9090
        livenessProbe:
          grpc:
            port: 9003
            service: envoy.service.ext_proc.v3.ExternalProcessor
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          grpc:
            port: 9003
            service: envoy.service.ext_proc.v3.ExternalProcessor
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: epp-config
          mountPath: /etc/epp
        - name: cache
          mountPath: /cache
      # vLLM render sidecar — exposes /v1/completions/render and
      # /v1/chat/completions/render over loopback for the token-producer plugin.
      - name: vllm-render
        image: ${VLLM_RENDER_IMAGE}
        imagePullPolicy: IfNotPresent
        command: ["vllm", "launch", "render"]
        args: ["${MODEL_NAME}", "--port=8000"]
        ports:
        - name: render-http
          containerPort: 8000
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 60
        volumeMounts:
        - name: model-cache
          mountPath: /root/.cache/huggingface
      volumes:
      - name: epp-config
        configMap:
          name: epp-config
      - name: cache
        emptyDir: {}
      # HuggingFace cache for the render sidecar's model weights.
      - name: model-cache
        emptyDir: {}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-render
  labels:
    app: vllm-render
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-render
  template:
    metadata:
      labels:
        app: vllm-render
    spec:
      containers:
      - name: vllm-render
        image: ${VLLM_RENDER_IMAGE}
        imagePullPolicy: IfNotPresent
        args:
        - "--model=${MODEL_NAME}"
        - "--port=${VLLM_RENDER_PORT}"
        - "--force-dummy-tokenizer"
        ports:
        - name: http
          containerPort: ${VLLM_RENDER_PORT}
          protocol: TCP
        startupProbe:
          httpGet:
            path: /health
            port: ${VLLM_RENDER_PORT}
          failureThreshold: 60
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: ${VLLM_RENDER_PORT}
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: ${VLLM_RENDER_PORT}
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      volumes: []
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-render
  labels:
    app: vllm-render
spec:
  selector:
    app: vllm-render
  ports:
  - name: http
    protocol: TCP
    port: ${VLLM_RENDER_PORT}
    targetPort: ${VLLM_RENDER_PORT}
